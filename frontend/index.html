<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foodie | Premium Food Delivery</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@500;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #FF4757;
            --primary-dark: #E03B49;
            --secondary: #2F3542;
            --bg: #F1F2F6;
            --surface: #FFFFFF;
            --text: #2F3542;
            --text-light: #747D8C;
            --success: #2ED573;
            --warning: #FFA502;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            padding-bottom: 40px;
        }

        h1,
        h2,
        h3,
        h4,
        h5,
        h6 {
            font-family: 'Poppins', sans-serif;
            margin-top: 0;
        }

        /* Navbar */
        .navbar {
            background: var(--surface);
            padding: 15px 0;
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            font-size: 24px;
            color: var(--primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nav-links {
            display: flex;
            gap: 20px;
        }

        .nav-btn {
            background: transparent;
            border: none;
            font-family: 'Poppins', sans-serif;
            font-weight: 500;
            color: var(--text);
            cursor: pointer;
            padding: 8px 16px;
            border-radius: 50px;
            transition: all 0.3s;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .nav-btn:hover,
        .nav-btn.active {
            background: #FFEAEF;
            color: var(--primary);
        }

        .nav-btn.cart-btn {
            background: var(--secondary);
            color: white;
        }

        .nav-btn.cart-btn:hover {
            background: var(--primary);
            transform: translateY(-2px);
        }

        /* Hero */
        .hero {
            background: linear-gradient(135deg, #FF4757 0%, #FF6B81 100%);
            color: white;
            padding: 80px 20px;
            text-align: center;
            margin-bottom: 40px;
        }

        .hero h1 {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .hero p {
            font-size: 1.2rem;
            opacity: 0.9;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Layout */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .page-section {
            display: none;
            animation: fadeIn 0.4s ease;
        }

        .page-section.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Cards */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
        }

        .card {
            background: var(--surface);
            border-radius: 16px;
            padding: 25px;
            box-shadow: var(--shadow);
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
            border: 1px solid rgba(0, 0, 0, 0.03);
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.12);
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: var(--primary);
        }

        .card-icon {
            font-size: 40px;
            margin-bottom: 15px;
            background: #FFF0F3;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card h2 {
            color: var(--secondary);
            margin-bottom: 8px;
            font-size: 1.4rem;
        }

        .card p {
            color: var(--text-light);
            margin: 4px 0;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Menu Items */
        .menu-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .menu-item {
            background: var(--surface);
            padding: 20px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow);
            border: 1px solid rgba(0, 0, 0, 0.03);
            transition: transform 0.2s;
        }

        .menu-item:hover {
            transform: scale(1.01);
        }

        .menu-info h3 {
            margin-bottom: 5px;
            color: var(--secondary);
            font-size: 1.2rem;
        }

        .menu-info p {
            color: var(--text-light);
            font-size: 0.9rem;
        }

        .price-tag {
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            color: var(--primary);
            font-size: 1.2rem;
            margin-top: 8px;
        }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 50px;
            font-family: 'Poppins', sans-serif;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1rem;
        }

        .btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 71, 87, 0.3);
        }

        .btn:disabled {
            background: var(--text-light);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-outline {
            background: transparent;
            border: 2px solid #ddd;
            color: var(--text-light);
            padding: 8px 20px;
        }

        .btn-outline:hover {
            border-color: var(--secondary);
            color: var(--secondary);
            transform: none;
            box-shadow: none;
            background: white;
        }

        /* Cart */
        .cart-container {
            background: var(--surface);
            border-radius: 16px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .cart-item {
            padding: 20px;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cart-item:last-child {
            border-bottom: none;
        }

        .qty-controls {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--bg);
            padding: 6px 12px;
            border-radius: 50px;
            margin-top: 8px;
        }

        .qty-btn {
            background: white;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            color: var(--secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
            transition: transform 0.2s;
        }

        .qty-btn:hover {
            transform: scale(1.1);
            color: var(--primary);
        }

        .cart-summary {
            padding: 30px;
            background: #FAFAFA;
            border-top: 1px solid #eee;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--secondary);
            margin-bottom: 25px;
        }

        .remove-link {
            color: #ff6b81;
            font-size: 0.85rem;
            text-decoration: underline;
            cursor: pointer;
            border: none;
            background: none;
            padding: 0;
            margin-top: 5px;
        }

        /* Utilities */
        .badge {
            background: var(--warning);
            color: var(--secondary);
            padding: 3px 8px;
            border-radius: 10px;
            font-size: 0.75rem;
            font-weight: 700;
            position: absolute;
            top: -8px;
            right: -8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .loading {
            text-align: center;
            padding: 60px;
            color: var(--text-light);
            font-size: 1.1rem;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }

        .empty-state h2 {
            color: var(--text-light);
            margin-bottom: 20px;
        }

        .error-msg {
            background: #FFF0F3;
            color: var(--primary);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid #FFD1D7;
        }

        /* Mobile */
        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }

            .hero h1 {
                font-size: 2.2rem;
            }

            .menu-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }

            .menu-item .btn {
                width: 100%;
            }
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="#" onclick="showPage('home'); return false;" class="logo">
                🍔 Foodie
            </a>
            <div class="nav-links">
                <a href="#" onclick="showPage('home'); return false;" class="nav-btn">Home</a>
                <a href="#" onclick="showPage('cart'); return false;" class="nav-btn cart-btn">
                    <span style="position: relative;">
                        🛒 Cart
                        <span id="cartBadge" class="badge" style="display: none;">0</span>
                    </span>
                </a>
                <a href="admin.html" class="nav-btn" style="color: var(--text-light); font-size: 0.9rem;">Admin</a>
            </div>
        </div>
    </nav>

    <!-- Home Page - Restaurant List -->
    <div id="homePage" class="page-section active">
        <div class="hero">
            <div class="container">
                <h1>Delicious Food, Delivered</h1>
                <p>Choose from the best restaurants in town and get it delivered to your doorstep.</p>
            </div>
        </div>
        <div class="container">
            <h2 style="margin-bottom: 30px; display: flex; align-items: center; gap: 10px;">
                <span
                    style="background: var(--primary); width: 6px; height: 24px; border-radius: 4px; display: inline-block;"></span>
                Popular Restaurants
            </h2>
            <div id="restaurantList" class="grid">
                <div class="loading">Loading restaurants...</div>
            </div>
        </div>
    </div>

    <!-- Menu Page -->
    <div id="menuPage" class="page-section">
        <div class="container" style="margin-top: 40px; max-width: 900px;">
            <button class="btn btn-outline" onclick="showPage('home')" style="margin-bottom: 20px;">← Back to
                Restaurants</button>

            <div
                style="background: var(--surface); padding: 30px; border-radius: 16px; box-shadow: var(--shadow); margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <h1 id="menuTitle" style="margin: 0; color: var(--secondary);">Menu</h1>
                    <p style="color: var(--text-light); margin: 5px 0 0 0;">Select items to add to your cart</p>
                </div>
                <div style="font-size: 40px;">🍽️</div>
            </div>

            <div id="menuList" class="menu-list">
                <div class="loading">Loading menu...</div>
            </div>
        </div>
    </div>

    <!-- Cart Page -->
    <div id="cartPage" class="page-section">
        <div class="container" style="margin-top: 40px; max-width: 800px;">
            <h1 style="margin-bottom: 30px; text-align: center;">Your Cart</h1>
            <div id="cartContainer" class="cart-container">
                <div id="cartList"></div>
                <div id="cartSummary" class="cart-summary"></div>
            </div>
        </div>
    </div>

    <!-- Order Success Page -->
    <div id="orderSuccessPage" class="page-section">
        <div class="container" style="margin-top: 60px; text-align: center;">
            <div
                style="background: var(--surface); padding: 60px; border-radius: 24px; box-shadow: var(--shadow); display: inline-block; max-width: 500px; width: 100%;">
                <div style="font-size: 70px; margin-bottom: 20px;">🎉</div>
                <h1 style="color: var(--success); margin-bottom: 10px;">Order Placed!</h1>
                <p style="color: var(--text-light);">Your food is on its way.</p>
                <div id="orderMsg"
                    style="background: #F0FFF4; padding: 20px; border-radius: 12px; margin: 30px 0; color: var(--secondary);">
                </div>
                <button class="btn" onclick="showPage('home')" style="width: 100%;">Order More Food</button>
            </div>
        </div>
    </div>

    <script>
        // Global state
        let cart = JSON.parse(localStorage.getItem("cart")) || [];
        let customerID = 1;
        let currentRestaurantID = null;
        let currentRestaurantName = null;

        // Navigation
        function showPage(pageName) {
            document.querySelectorAll('.page-section').forEach(section => {
                section.classList.remove('active');
            });

            switch (pageName) {
                case 'home':
                    document.getElementById('homePage').classList.add('active');
                    loadRestaurants();
                    break;
                case 'menu':
                    document.getElementById('menuPage').classList.add('active');
                    break;
                case 'cart':
                    document.getElementById('cartPage').classList.add('active');
                    cart = JSON.parse(localStorage.getItem("cart")) || [];
                    loadCart();
                    break;
                case 'orderSuccess':
                    document.getElementById('orderSuccessPage').classList.add('active');
                    break;
            }
            updateCartBadge();
            window.scrollTo(0, 0);
        }

        // Cart Badge
        function updateCartBadge() {
            const badge = document.getElementById("cartBadge");
            const count = cart.reduce((sum, item) => sum + (item.Quantity || 1), 0);
            badge.textContent = count;
            badge.style.display = count === 0 ? "none" : "inline-block";
        }

        // Load Restaurants
        function loadRestaurants() {
            const list = document.getElementById("restaurantList");
            list.innerHTML = '<div class="loading">Loading restaurants...</div>';

            fetch("http://localhost:3000/restaurants")
                .then(res => {
                    if (!res.ok) throw new Error("Failed to load restaurants");
                    return res.json();
                })
                .then(data => {
                    const restaurants = data.restaurants || data;

                    if (!Array.isArray(restaurants) || restaurants.length === 0) {
                        list.innerHTML = '<div class="empty-state"><h2>No restaurants available 😔</h2><p>Please check back later!</p></div>';
                        return;
                    }
                    list.innerHTML = "";
                    restaurants.forEach(r => {
                        const div = document.createElement("div");
                        div.className = "card";
                        div.innerHTML = `
                            <div class="card-icon">🏢</div>
                            <h2>${r.Name}</h2>
                            <p>📍 ${r.Location}</p>
                            ${r.Contact ? `<p>📞 ${r.Contact}</p>` : ''}
                        `;
                        div.onclick = () => {
                            currentRestaurantID = r.RestaurantID;
                            showPage('menu');
                            loadMenu(r.RestaurantID, r.Name);
                        };
                        list.appendChild(div);
                    });
                })
                .catch(err => {
                    list.innerHTML = `<div class="error-msg">Error loading restaurants.<br><small>${err.message}</small></div>`;
                    console.error('Error loading restaurants:', err);
                });
        }

        // Load Menu
        function loadMenu(rid, restaurantName) {
            currentRestaurantID = rid;
            currentRestaurantName = restaurantName;
            const list = document.getElementById("menuList");
            const title = document.getElementById("menuTitle");
            title.textContent = restaurantName ? `${restaurantName}` : "Menu";
            list.innerHTML = '<div class="loading">Loading menu...</div>';

            hideAddMenuItemsForm();

            fetch(`http://localhost:3000/restaurants/${rid}/menu`)
                .then(res => {
                    if (!res.ok) throw new Error("Failed to load menu");
                    return res.json();
                })
                .then(data => {
                    const items = data.menu || data;

                    if (!Array.isArray(items) || items.length === 0) {
                        list.innerHTML = '<div class="empty-state"><h2>No menu items found 🍽️</h2><p>This restaurant hasn\'t added their menu yet.</p></div>';
                        return;
                    }
                    list.innerHTML = "";
                    items.forEach(i => {
                        const div = document.createElement("div");
                        div.className = "menu-item";
                        div.innerHTML = `
                            <div class="menu-info">
                                <h3>${i.ItemName}</h3>
                                <p>${i.Category ? `Category: ${i.Category}` : 'General'}</p>
                                <div class="price-tag">₹${i.Price}</div>
                            </div>
                            <button class="btn" onclick="addToCart(${i.MenuID}, '${i.ItemName.replace(/'/g, "\\'")}', ${i.Price}, ${rid})">
                                + Add
                            </button>
                        `;
                        list.appendChild(div);
                    });
                })
                .catch(err => {
                    list.innerHTML = `<div class="error-msg">Error loading menu.<br><small>${err.message}</small></div>`;
                    console.error('Error loading menu:', err);
                });
        }

        // Add to Cart
        function addToCart(menuID, itemName, price, restaurantID) {
            // Check if adding from a different restaurant
            if (cart.length > 0 && cart[0].RestaurantID !== restaurantID) {
                if (!confirm("Start a new cart? You can only order from one restaurant at a time.")) {
                    return;
                }
                cart = [];
            }

            const existingItem = cart.find(item => item.MenuID === menuID);

            if (existingItem) {
                existingItem.Quantity = (existingItem.Quantity || 1) + 1;
                existingItem.Subtotal = (parseFloat(existingItem.Subtotal) + parseFloat(price)).toFixed(2);
            } else {
                cart.push({
                    MenuID: menuID,
                    Quantity: 1,
                    Subtotal: parseFloat(price).toFixed(2),
                    ItemName: itemName,
                    RestaurantID: restaurantID
                });
            }

            localStorage.setItem("cart", JSON.stringify(cart));
            updateCartBadge();

            // Show notification
            const notification = document.createElement("div");
            notification.style.cssText = "position: fixed; bottom: 30px; right: 30px; background: var(--secondary); color: white; padding: 15px 25px; border-radius: 50px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); z-index: 1000; font-family: 'Poppins', sans-serif; animation: fadeIn 0.3s ease;";
            notification.innerHTML = "✅ Added to cart";
            document.body.appendChild(notification);
            setTimeout(() => {
                notification.style.opacity = '0';
                setTimeout(() => notification.remove(), 300);
            }, 2000);
        }

        // Load Cart
        function loadCart() {
            const list = document.getElementById("cartList");
            const summary = document.getElementById("cartSummary");
            let total = 0;

            updateCartBadge();

            if (cart.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div style="font-size: 60px; margin-bottom: 20px;">🛒</div>
                        <h2>Your cart is empty</h2>
                        <p>Looks like you haven't added anything yet.</p>
                        <button class="btn" onclick="showPage('home')" style="margin-top: 20px;">Browse Restaurants</button>
                    </div>
                `;
                summary.innerHTML = "";
                summary.style.display = "none";
                return;
            }

            summary.style.display = "block";
            list.innerHTML = "";
            cart.forEach((c, index) => {
                const quantity = c.Quantity || 1;
                const subtotal = parseFloat(c.Subtotal) || 0;
                total += subtotal;

                const itemDiv = document.createElement("div");
                itemDiv.className = "cart-item";
                itemDiv.innerHTML = `
                    <div class="cart-item-info">
                        <h3 style="margin: 0 0 5px 0; color: var(--secondary);">${c.ItemName}</h3>
                        <div style="color: var(--primary); font-weight: 600;">₹${subtotal.toFixed(2)}</div>
                        <button class="remove-link" onclick="removeFromCart(${index})">Remove</button>
                    </div>
                    <div class="qty-controls">
                        <button class="qty-btn" onclick="updateQuantity(${index}, -1)">-</button>
                        <span style="font-weight: 600; min-width: 20px; text-align: center;">${quantity}</span>
                        <button class="qty-btn" onclick="updateQuantity(${index}, 1)">+</button>
                    </div>
                `;
                list.appendChild(itemDiv);
            });

            summary.innerHTML = `
                <div class="total-row">
                    <span>Total Amount</span>
                    <span>₹${total.toFixed(2)}</span>
                </div>
                
                <div style="margin-bottom: 20px;">
                    <h3 style="margin-bottom: 10px; color: var(--secondary);">Payment Method</h3>
                    <div style="display: flex; flex-direction: column; gap: 10px;">
                        <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
                            <input type="radio" name="paymentMethod" value="Card" checked> Card
                        </label>
                        <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
                            <input type="radio" name="paymentMethod" value="Cash"> Cash
                        </label>
                        <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
                            <input type="radio" name="paymentMethod" value="UPI"> UPI
                        </label>
                        <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
                            <input type="radio" name="paymentMethod" value="NetBanking"> NetBanking
                        </label>
                    </div>
                </div>

                <button class="btn" id="placeOrderBtn" style="width: 100%; padding: 15px; font-size: 1.1rem;">
                    Place Order (₹${total.toFixed(2)})
                </button>
            `;

            document.getElementById("placeOrderBtn").onclick = placeOrder;
        }

        // Update Quantity
        function updateQuantity(index, change) {
            cart[index].Quantity = (cart[index].Quantity || 1) + change;
            if (cart[index].Quantity < 1) {
                removeFromCart(index);
                return;
            }
            // Recalculate subtotal
            // We need the unit price. Since we only stored subtotal, we derive it.
            // Ideally we should store UnitPrice.
            // Assuming Subtotal was correct before:
            const oldQty = cart[index].Quantity - change;
            const unitPrice = parseFloat(cart[index].Subtotal) / oldQty;

            cart[index].Subtotal = (unitPrice * cart[index].Quantity).toFixed(2);
            localStorage.setItem("cart", JSON.stringify(cart));
            loadCart();
        }

        // Remove from Cart
        function removeFromCart(index) {
            cart.splice(index, 1);
            localStorage.setItem("cart", JSON.stringify(cart));
            loadCart();
        }

        // Place Order
        function placeOrder() {
            if (cart.length === 0) {
                alert("Cart is empty!");
                return;
            }

            const restaurantID = cart[0].RestaurantID;
            const button = document.getElementById("placeOrderBtn");

            // Get selected payment method
            const paymentMethod = document.querySelector('input[name="paymentMethod"]:checked').value;

            button.disabled = true;
            button.textContent = "Placing Order...";

            const orderData = {
                CustomerID: customerID,
                RestaurantID: restaurantID,
                items: cart,
                paymentMethod: paymentMethod
            };

            fetch("http://localhost:3000/orders", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(orderData)
            })
                .then(res => res.json())
                .then(data => {
                    if (data.success) {
                        cart = [];
                        localStorage.removeItem("cart");
                        updateCartBadge();

                        const msg = document.getElementById("orderMsg");
                        msg.innerHTML = `
                        <p><strong>Order ID:</strong> #${data.orderId}</p>
                        <p><strong>Amount:</strong> ₹${data.total}</p>
                        <p><strong>Payment Method:</strong> ${paymentMethod}</p>
                        <hr style="margin: 15px 0; border: 0; border-top: 1px solid #eee;">
                        <p><strong>Delivery Partner:</strong> ${data.deliveryPartner}</p>
                        <div id="deliveryTimer" style="margin-top: 15px; font-weight: bold; font-size: 1.2rem; color: var(--primary);">
                            Delivering in: ${data.deliveryTimeSeconds}s
                        </div>
                    `;

                        showPage('orderSuccess');

                        // Start Countdown
                        let timeLeft = data.deliveryTimeSeconds;
                        const timerElement = document.getElementById('deliveryTimer');

                        const countdown = setInterval(() => {
                            timeLeft--;
                            if (timeLeft > 0) {
                                timerElement.textContent = `Delivering in: ${timeLeft}s`;
                            } else {
                                clearInterval(countdown);
                                timerElement.innerHTML = "✅ Delivered!";
                                timerElement.style.color = "var(--success)";
                            }
                        }, 1000);
                    } else {
                        alert("Failed to place order: " + data.error);
                        button.disabled = false;
                        button.textContent = `Place Order (₹${document.querySelector('.total-row span:last-child').textContent.replace('₹', '')})`;
                    }
                })
                .catch(err => {
                    console.error("Error placing order:", err);
                    alert("Error placing order. Please try again.");
                    button.disabled = false;
                    button.textContent = `Place Order (₹${document.querySelector('.total-row span:last-child').textContent.replace('₹', '')})`;
                });
        }

        // Initialize
        updateCartBadge();
        loadRestaurants();

        function hideAddMenuItemsForm() {
            // No-op
        }
    </script>

</body>

</html>
